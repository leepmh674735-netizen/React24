<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>댓글작성하기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-4">
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">댓글 작성 구현하기</h5>
                <p class="card-text">
                    구현할 기능은 댓글작성, 좋아요, 수정, 삭제입니다. <br/>
                    기능 구현은 아래 댓글 작성부터 하면 됩니다.
                </p>
            </div>
        </div>

        <button class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#commentModal">
            댓글 작성
        </button>

        <div class="modal fade" id="commentModal" tabindex="-1" 
        aria-labelledby="commentModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="commentModalLabel">댓글 작성</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="commentAuthor" class="form-label">작성자명</label>
                            <input type="text" class="form-control" id="commentAuthor" 
                            placeholder="이름을 입력하세요" required>
                        </div>
                        <div class="mb-3">
                            <label for="commentContents" class="form-label">댓글 내용</label>
                            <textarea class="form-control" id="commentContents" rows="3"
                             placeholder="댓글을 입력하세요"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                        <button type="button" class="btn btn-primary">작성</button>
                    </div>
                </div>
            </div>
        </div>

        <ul class="list-group">
            <li class="list-group-item">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <strong>작성자</strong>
                        <small class="text-muted ms-2">2025-03-22 14:30</small>
                    </div>
                    <div>
                        <button class="btn btn-outline-success btn-sm me-1">좋아요 (0)</button>
                        <button class="btn btn-outline-warning btn-sm me-1">수정</button>
                        <button class="btn btn-outline-danger btn-sm">삭제</button>
                    </div>
                </div>
                <p class="mt-2 mb-0" style="white-space: pre-wrap;">
                    댓글은 여기에 출력됩니다. 줄바꿈 처리로 해주세요.
                댓글 작성과 수정 모달창을 이용하면 됩니다.</p>
            </li>
        </ul>
    </div>
</body>
</html>
